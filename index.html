<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부트로더 생성기 v2.5.0 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #0d1117; color: #c9d1d9; overflow-x: hidden; scroll-behavior: smooth; }
        header { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .terminal-container { background-color: #000; border: 1px solid #30363d; border-radius: 8px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; margin-top: 12px; }
        .qemu-screen { color: #d1d5db; font-family: 'Fira Code', monospace; min-height: 300px; background-color: #000; line-height: 1.4; padding: 20px; overflow-y: auto; }
        .code-block { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; transition: border-color 0.3s ease; }
        .edit-active { border-color: #58a6ff !important; box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        .checkbox-custom:checked + label { color: #58a6ff; font-weight: bold; }
        .btn-primary { background: linear-gradient(135deg, #238636 0%, #2ea043 100%); transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .viewer-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .viewer-content.open { max-height: 2500px; }
        #resizer-handle { height: 12px; width: 100%; cursor: ns-resize; background: #21262d; border-top: 1px solid #30363d; display: flex; justify-content: center; align-items: center; z-index: 10; }
        #resizer-handle:hover { background: #30363d; }
        #resizer-handle::after { content: ""; width: 40px; height: 4px; background: #484f58; border-radius: 2px; }
        .resizing { border-color: #58a6ff !important; user-select: none; }
        .text-qemu-info { color: #8b949e; }
        .text-qemu-cmd { color: #58a6ff; }
        .text-qemu-error { color: #f85149; font-weight: bold; }
        .text-qemu-success { color: #3fb950; font-weight: bold; }
        #ai-panel { border-left: 4px solid #f85149; background: #220a0a; }
    </style>
</head>
<body class="p-0">
    <header class="sticky top-0 z-50 bg-[#0d1117]/95 backdrop-blur-lg border-b border-gray-700 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
                🛸 QEMU 클라우드 부트 테스터 <span class="text-[10px] bg-blue-900 text-blue-200 px-2 py-0.5 rounded-full uppercase">Pro v2.5.0</span>
            </h1>
        </div>
        <div class="flex gap-3">
            <button onclick="runQemuTest()" class="btn-primary text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg flex items-center gap-2">
                ▶ 빌드 & 실행
            </button>
            <button onclick="downloadCode()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-6 py-2 rounded-lg text-sm font-bold border border-gray-600 transition">
                소스 다운로드
            </button>
        </div>
    </header>

    <main class="p-6 grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
        <div class="xl:col-span-4 space-y-6">
            <section class="code-block p-5 border-t-4 border-blue-500">

                <div class="space-y-3 text-sm">
                    <div class="flex items-center gap-3">

                        <label for="opt-segment" class="cursor-pointer">데이터 세그먼트 초기화</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="opt-stack" checked class="w-4 h-4 checkbox-custom" onchange="generate()">
                        <label for="opt-stack" class="cursor-pointer">스택 포인터 설정 (0x7C00)</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="opt-clear" class="w-4 h-4 checkbox-custom" onchange="generate()">
                        <label for="opt-clear" class="cursor-pointer">화면 초기화 (Int 10h)</label>

            <section class="code-block p-5 border-t-4 border-yellow-500">

                    <div class="flex items-center gap-3">

                        <label for="opt-pm" class="cursor-pointer">32비트 보호 모드 진입 (GDT)</label>

                <div class="bg-[#1c2128] px-5 py-3 text-xs border-b border-gray-700 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-3">

                        <span class="font-bold text-gray-400 ml-2 uppercase tracking-widest">bootloader.asm</span>

                            <button onclick="cancelChanges()" class="bg-red-900/40 hover:bg-red-800 text-red-200 px-4 py-1.5 rounded text-[11px] font-bold transition">취소</button>
                        </div>

                        <h3 class="text-sm font-bold text-red-400 uppercase">AI 정밀 진단 리포트 (Virtual NASM)</h3>
                    </div>

                    <div id="build-content" class="viewer-content">

    <script>
        let isManualEdit = false;
        let backupCode = "";
        const output = document.getElementById('output');
        const qemuScreen = document.getElementById('qemu-screen');
        const qemuStatus = document.getElementById('qemu-status');
        const aiPanel = document.getElementById('ai-panel');
        const aiSuggestion = document.getElementById('ai-suggestion');
        const editorContainer = document.getElementById('editor-container');
        const resizer = document.getElementById('resizer-handle');

        // Resizer Logic
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'ns-resize'; editorContainer.classList.add('resizing'); e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerTop = editorContainer.getBoundingClientRect().top + window.scrollY;
            const newHeight = e.pageY - containerTop;
            if (newHeight > 300) editorContainer.style.height = newHeight + "px";
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; editorContainer.classList.remove('resizing'); });

        function generate() {
            if (isManualEdit) return; 
            const outputMode = document.querySelector('input[name="output-mode"]:checked').value;
            const config = {
                segment: document.getElementById('opt-segment').checked,
                stack: document.getElementById('opt-stack').checked,
                clear: document.getElementById('opt-clear').checked,
                a20: document.getElementById('opt-a20').checked,
                pm: document.getElementById('opt-pm').checked,
                error: document.getElementById('opt-error').checked,
                load: document.getElementById('opt-load').checked,
                addr: document.getElementById('kernel-addr').value || "0x8000",
                sectors: document.getElementById('kernel-sectors').value || "1",
                msg: document.getElementById('kernel-msg').value || "KERNEL LOADED",
                kColor: document.getElementById('kernel-color').value,
                outputMode: outputMode 
            };

            let code = "; --- Cloud Managed Bootloader v2.5.0 ---\n[org 0x7c00]\n\nstart:\n    mov [BOOT_DRIVE], dl    ; 부트 드라이브 보존\n\n";
            if (config.segment) code += "    xor ax, ax\n    mov ds, ax\n    mov es, ax\n";
            if (config.stack) code += "    mov bp, 0x7c00\n    mov sp, bp\n";
            if (config.clear) code += "    mov ax, 0x0003\n    int 0x10\n";
            if (config.a20) code += "\n    ; A20 활성화\n    mov ax, 0x2401\n    int 0x15\n    jc panic_a20\n";
            if (config.load) {
                const addrVal = parseInt(config.addr, 16);
                const seg = (addrVal >> 4).toString(16);
                const off = (addrVal & 0xF).toString(16);
                code += `\n    ; 커널 로딩 (${config.sectors} 섹터)\n    mov ax, 0x${seg}\n    mov es, ax\n    mov bx, 0x${off}\n    mov ah, 0x02\n    mov al, ${config.sectors}\n    mov ch, 0\n    mov dh, 0\n    mov cl, 2\n    mov dl, [BOOT_DRIVE]\n    int 0x13\n    jc panic_disk\n`;
            }
            if (config.pm) code += "\n    ; 32비트 보호 모드 진입\n    cli\n    lgdt [gdt_descriptor]\n    mov eax, cr0\n    or eax, 0x1\n    mov cr0, eax\n    jmp CODE_SEG:init_pm\n";
            else code += `\n    jmp ${config.addr}\n`;
            code += "\n    jmp $ ; 무한 루프\n";
            if (config.pm) code += "\n[bits 32]\ninit_pm:\n    mov ax, DATA_SEG\n    mov ds, ax\n    mov ss, ax\n    jmp 0x8000\n\ngdt_start: dq 0x0\ngdt_code: dw 0xffff, 0x0\n    db 0x0, 10011010b, 11001111b, 0x0\ngdt_data: dw 0xffff, 0x0\n    db 0x0, 10010010b, 11001111b, 0x0\ngdt_end:\ngdt_descriptor: dw gdt_end-gdt_start-1\n    dd gdt_start\nCODE_SEG equ gdt_code-gdt_start\nDATA_SEG equ gdt_data-gdt_start\n";
            code += "\npanic_disk: mov si, e_disk\n    call print\n    jmp $\npanic_a20:  mov si, e_a20\n    call print\n    jmp $\n\n; 시스템 출력 유틸리티 (Standard Print)\nprint:\n";
            if (config.outputMode === 'bios') code += "    pusha\n    mov ah, 0x0e\n.l: lodsb\n    or al, al\n    jz .d\n    int 0x10\n    jmp .l\n.d: popa\n    ret\n";
            else {
                if (config.pm) code += "    [bits 32]\n    pusha\n    mov edx, 0xb8000\n.l: lodsb\n    or al, al\n    jz .d\n    mov [edx], al\n    mov [edx+1], byte 0x04\n    add edx, 2\n    jmp .l\n.d: popa\n    ret\n";
                else code += "    pusha\n    mov ax, 0xb800\n    mov es, ax\n    xor di, di\n.l: lodsb\n    or al, al\n    jz .d\n    mov [es:di], al\n    mov [es:di+1], byte 0x04\n    add di, 2\n    jmp .l\n.d: popa\n    ret\n";
            }
            code += "\ne_disk db 'DISK READ ERROR!', 0\ne_a20  db 'A20 GATE FAILURE!', 0\n\nBOOT_DRIVE db 0\ntimes 510-($-$$) db 0\ndw 0xaa55\n";
            output.value = code;
            updateKernelDoc(config);
            updateBuildDoc(config);
        }

        // 3단계 정밀 분석 엔진 (Virtual NASM)
        function validateAsm(code) {
            const lines = code.split('\n');
            const errors = [];
            const definedLabels = new Set();
            const usedLabels = [];
            let currentMode = 16;

            // x86 예약어 (레지스터, 명령어, 지시어) 대폭 확장
            const x86_keywords = new Set([
                // General Purpose Registers
                'ax','bx','cx','dx','si','di','sp','bp','al','ah','bl','bh','cl','ch','dl','dh',
                'eax','ebx','ecx','edx','esi','edi','esp','ebp',
                // Segment & Control Registers
                'ds','es','ss','cs','fs','gs','cr0','cr2','cr3',
                // Instructions
                'mov','xor','int','jmp','call','pusha','popa','ret','lodsb','or','jz','jnz','jc','jnc',
                'cli','sti','lgdt','add','sub','inc','dec','cmp','hlt','push','pop','test','je','jne',
                // Pseudo-ops & Directives
                'db','dw','dd','dq','resb','resw','resd','times','org','bits','byte','word','dword','qword','equ'
            ]);

            lines.forEach((line, idx) => {
                const lineNum = idx + 1;
                // 주석 제거 및 문자열 리터럴 임시 제거 (분석 방해 방지)
                let cleanLine = line.split(';')[0].trim();
                if (!cleanLine) return;

                if (cleanLine.includes('[bits 32]')) currentMode = 32;
                if (cleanLine.includes('[bits 16]')) currentMode = 16;

                // 레이블 수집 (예: start:, kernel_main:)
                const labelMatch = cleanLine.match(/^([a-zA-Z0-9_]+):/);
                // 데이터 정의 수집 (예: e_disk db ...)
                const dataDefMatch = cleanLine.match(/^([a-zA-Z0-9_]+)\s+(d[bwqd]|equ)/i);
                
                if (labelMatch) definedLabels.add(labelMatch[1]);
                if (dataDefMatch) definedLabels.add(dataDefMatch[1]);

                // 구문 검사: 브래킷 쌍
                const opens = (cleanLine.match(/\[/g) || []).length;
                const closes = (cleanLine.match(/\]/g) || []).length;
                if (opens !== closes) {
                    errors.push({ loc: `라인 ${lineNum}`, cause: `대괄호 '[' 가 열렸으나 ']' 로 닫히지 않았습니다.`, fix: `메모리 참조 형식을 ' [주소] ' 형태로 완성하세요.` });
                }

                // 심볼 참조 분석 (문자열 내부는 제외)
                const lineWithoutStrings = cleanLine.replace(/'[^']*'/g, '').replace(/"[^"]*"/g, '');
                const parts = lineWithoutStrings.split(/[\s,\[\]\+\-\*\/]+/).filter(p => p);
                
                parts.forEach(p => {
                    const lowP = p.toLowerCase();
                    // 숫자가 아니고, x86 예약어가 아니며, 정의된 레이블도 아닌 경우
                    if (p.match(/^[a-zA-Z_][a-zA-Z0-9_]*$/) && 
                        !x86_keywords.has(lowP) && 
                        !definedLabels.has(p)) {
                        // 세그먼트 오버라이드 (es:, ds:) 처리
                        if (lowP.endsWith(':')) return; 
                        usedLabels.push({ name: p, line: lineNum });
                    }
                });
            });

            // 정의되지 않은 심볼 최종 확인
            usedLabels.forEach(u => {
                if (!definedLabels.has(u.name)) {
                    errors.push({ loc: `라인 ${u.line}`, cause: `'${u.name}' 이라는 변수나 레이블을 찾을 수 없습니다. (오타 가능성)`, fix: `'${u.name} db 0' 처럼 데이터를 정의하거나 철자를 확인하세요.` });
                }
            });

            const kernelAddrStr = document.getElementById('kernel-addr').value;
            const jmpMatch = code.match(/jmp\s+(0x[0-9a-f]+)/i);
            if (jmpMatch && jmpMatch[1].toLowerCase() !== kernelAddrStr.toLowerCase()) {
                errors.push({ loc: `가상 런타임 분석`, cause: `커널은 ${kernelAddrStr}에 로드되었지만, 점프 주소는 ${jmpMatch[1]}로 설정되었습니다.`, fix: `점프 대상을 'jmp ${kernelAddrStr}'로 수정하여 제어권을 일치시키세요.` });
            }

            if (!code.includes('0xaa55')) {
                errors.push({ loc: `바이너리 빌드 오류`, cause: `유효한 부트 서명(0xAA55)이 없습니다.`, fix: `코드 마지막 섹터 끝에 'dw 0xaa55'를 반드시 포함해야 합니다.` });
            }

            return errors;
        }

        async function runQemuTest() {
            qemuScreen.innerHTML = "";
            qemuStatus.textContent = "빌드 중...";
            qemuStatus.className = "text-yellow-500 blink font-bold text-[10px]";
            aiPanel.classList.add('hidden');

            const code = output.value;
            qemuScreen.innerHTML += `<div class='text-qemu-info'>[SYSTEM] 3단계 정밀 분석 엔진 가동...</div>`;
            await new Promise(r => setTimeout(r, 600));

            const buildErrors = validateAsm(code);

            if (buildErrors.length > 0) {
                qemuScreen.innerHTML += `<div class='text-qemu-error'>[FATAL] 빌드가 중단되었습니다. (결함 발견: ${buildErrors.length}건)</div>`;
                qemuStatus.textContent = "빌드 에러";
                qemuStatus.className = "text-red-500 font-bold text-[10px]";
                
                aiPanel.classList.remove('hidden');
                aiSuggestion.innerHTML = buildErrors.map(err => `
                    <div class="border-b border-red-900/30 pb-2 mb-2">
                        <div><strong>📍 위치:</strong> ${err.loc}</div>
                        <div><strong>🔍 원인:</strong> ${err.cause}</div>
                        <div class="text-green-400"><strong>💡 수정 제안:</strong> ${err.fix}</div>
                    </div>
                `).join('');
                return;
            }

            qemuScreen.innerHTML += `<div class='text-qemu-success'>[SUCCESS] bootloader.bin 컴파일 완료.</div>`;
            await new Promise(r => setTimeout(r, 500));
            
            const logs = ["[SeaBIOS] Machine: i440FX initialized.", "[SYSTEM] Memory: 128MB RAM verified.", "Booting from Hard Disk (Raw Image)..."];
            for (const log of logs) {
                qemuScreen.innerHTML += `<div class='text-qemu-info'>${log}</div>`;
                await new Promise(r => setTimeout(r, 400));
            }

            const currentMsg = document.getElementById('kernel-msg').value || "LOADED";
            const kColorAttr = document.getElementById('kernel-color').value;
            const colorMap = { "0x0a": "#55ff55", "0x0b": "#55ffff", "0x0c": "#ff5555", "0x0e": "#ffff55", "0x0f": "#ffffff" };
            qemuScreen.innerHTML += `<div class='mt-6 text-3xl font-bold tracking-widest' style='color: ${colorMap[kColorAttr]}'>${currentMsg}</div>`;
            qemuStatus.textContent = "온라인";
            qemuStatus.className = "text-green-500 font-bold text-[10px]";
        }

        function enterEditMode() {
            isManualEdit = true; backupCode = output.value; output.readOnly = false; output.focus();
            editorContainer.classList.add('edit-active');
            document.getElementById('default-actions').classList.add('hidden');
            document.getElementById('edit-actions').classList.remove('hidden');
        }

        function saveChanges() {
            isManualEdit = true; output.readOnly = true;
            editorContainer.classList.remove('edit-active');
            document.getElementById('default-actions').classList.remove('hidden');
            document.getElementById('edit-actions').classList.add('hidden');
        }

        function cancelChanges() {
            output.value = backupCode; saveChanges(); isManualEdit = false; generate();
        }

        function applyAiFix() {
            isManualEdit = false; aiPanel.classList.add('hidden'); generate();
            qemuScreen.innerHTML = "<div class='text-indigo-400 p-4'>[AI 정밀 분석] 결함 코드를 폐기하고 안정된 표준 코드로 복구했습니다.</div>";
        }

        function copyCode() { output.select(); document.execCommand('copy'); }
        function downloadCode() { const blob = new Blob([output.value], { type: 'text/plain' }); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'bootloader.asm'; a.click(); }
        function toggleView(id) { const content = document.getElementById(id); const icon = document.getElementById(id + '-icon'); content.classList.toggle('open'); icon.textContent = content.classList.contains('open') ? "📖" : "📂"; }

        function updateKernelDoc(config) {
            let k = `[org ${config.addr}]\nkernel_main:\n`;
            if (config.pm) k += "    [bits 32]\n";
            k += "    mov ax, 0xb800\n    mov es, ax\n    xor di, di\n";
            for(let i=0; i<config.msg.length; i++) k += `    mov [es:di], byte '${config.msg[i]}'\n    mov [es:di+1], byte ${config.kColor}\n    add di, 2\n`;
            k += "    jmp $";
            document.getElementById('kernel-view').textContent = k;
        }

        function updateBuildDoc(config) {
            let b = `# 1. 컴파일 (NASM)\nnasm -f bin bootloader.asm -o bootloader.bin\nnasm -f bin kernel.asm -o kernel.bin\n\n# 2. 이미지 합치기\ncat bootloader.bin kernel.bin > drive.img\ntruncate -s 1440k drive.img\n\n# 3. QEMU 실행\nqemu-system-x86_64 -drive format=raw,file=drive.img`;
            document.getElementById('build-view').textContent = b;
        }

        window.onload = generate;
    </script>
</body>
</html>
